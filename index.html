
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>SkySearch</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SkySearch">
<meta name="theme-color" content="#060810">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23060810'/><text y='.9em' font-size='80' x='10'>✈</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060810;--bg2:#0d1120;--bg3:#141928;
  --card:#111827;--card2:#1a2235;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f4ff;--text2:#8899bb;--text3:#3d4f70;
  --accent:#4f7cff;--accentd:#2655e8;
  --cyan:#00d4ff;--green:#00e598;--gold:#ffb340;--red:#ff4f6a;--purple:#9b5dff;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* BG EFFECTS */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px)}
.o1{width:320px;height:320px;background:radial-gradient(circle,rgba(79,124,255,.15),transparent);top:-100px;left:-80px;animation:of 14s ease-in-out infinite}
.o2{width:280px;height:280px;background:radial-gradient(circle,rgba(155,93,255,.12),transparent);top:35%;right:-100px;animation:of 14s ease-in-out -5s infinite}
.o3{width:220px;height:220px;background:radial-gradient(circle,rgba(0,212,255,.08),transparent);bottom:25%;left:5%;animation:of 14s ease-in-out -10s infinite}
@keyframes of{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.06)}}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:white}

/* LAYOUT */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;overflow:hidden}
.sf{height:var(--sat);background:rgba(6,8,16,.95);flex-shrink:0}

/* HEADER */
.hdr{flex-shrink:0;background:rgba(6,8,16,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:14px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hdr-logo{display:flex;align-items:center;gap:11px}
.hdr-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(79,124,255,.4);animation:lp 3s ease-in-out infinite}
@keyframes lp{0%,100%{box-shadow:0 0 24px rgba(79,124,255,.4)}50%{box-shadow:0 0 38px rgba(79,124,255,.65)}}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.hdr-sub{font-size:10px;color:var(--text3);letter-spacing:.06em;margin-top:1px}
.live{display:flex;align-items:center;gap:5px;background:rgba(0,229,152,.1);border:1px solid rgba(0,229,152,.18);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:var(--green)}
.ld{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.75)}}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:28px}
.scroll::-webkit-scrollbar{display:none}

/* SEARCH CARD */
.sw{padding:18px 16px 0}
.sc{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border2);border-radius:20px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(79,124,255,.07),transparent 55%);pointer-events:none}
.slabel{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
textarea#q{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-family:'Outfit',-apple-system,sans-serif;font-size:16px;font-weight:300;color:var(--text);resize:none;height:82px;line-height:1.55;outline:none;-webkit-appearance:none;transition:border-color .25s,box-shadow .25s,background .25s}
textarea#q::placeholder{color:var(--text3)}
textarea#q:focus{border-color:var(--accent);background:rgba(79,124,255,.05);box-shadow:0 0 0 3px rgba(79,124,255,.12)}
.sbtn{width:100%;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:14px;height:52px;font-family:'Outfit',-apple-system,sans-serif;font-size:16px;font-weight:600;color:white;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:12px;cursor:pointer;-webkit-appearance:none;box-shadow:0 4px 20px rgba(79,124,255,.4);transition:transform .15s,box-shadow .15s,opacity .15s;position:relative;overflow:hidden}
.sbtn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.1),transparent)}
.sbtn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(79,124,255,.3)}
.sbtn:disabled{opacity:.4;transform:none}

/* CHIPS */
.chips{display:flex;gap:8px;padding:14px 16px 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .2s}
.chip:active{background:rgba(79,124,255,.18);border-color:rgba(79,124,255,.45);color:var(--accent);transform:scale(.95)}

/* LOADER */
.loader{display:none;padding:50px 20px;text-align:center}
.loader.on{display:block}
.radar{width:64px;height:64px;margin:0 auto 18px;position:relative}
.rr{position:absolute;inset:0;border-radius:50%}
.rr1{border:2px solid rgba(79,124,255,.2);border-top-color:var(--accent);animation:spin 1s linear infinite}
.rr2{width:44px;height:44px;top:10px;left:10px;border:1.5px solid rgba(155,93,255,.15);border-top-color:var(--purple);animation:spin .75s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.rplane{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.lstep{font-size:13px;color:var(--text2);min-height:20px;transition:opacity .25s}

/* RESULTS */
.results{padding:14px 16px 0}

.ctx{background:linear-gradient(135deg,rgba(79,124,255,.09),rgba(155,93,255,.07));border:1px solid rgba(79,124,255,.18);border-radius:16px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--text2);line-height:1.65;animation:fu .4s ease both}
.ctx b{color:var(--text)}
.wtag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,179,64,.1);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--gold);margin-top:9px}

.rbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px 16px;margin-bottom:14px;background:linear-gradient(135deg,rgba(79,124,255,.13),rgba(155,93,255,.1));border:1px solid rgba(79,124,255,.22);border-radius:14px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:var(--accent);text-decoration:none;animation:fu .4s .06s ease both;transition:transform .15s,opacity .15s}
.rbtn:active{transform:scale(.98);opacity:.75}

/* FLIGHT CARD */
.fc{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 24px rgba(0,0,0,.25);position:relative;animation:ci .45s cubic-bezier(.22,.68,0,1.15) both}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,124,255,.3),rgba(155,93,255,.3),transparent)}
@keyframes ci{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.fc-head{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.fc-left{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fc-num{font-size:19px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.fc-co{font-size:11px;font-weight:500;color:var(--text3);background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px}
.badge{font-size:10px;font-weight:600;padding:4px 11px;border-radius:20px;letter-spacing:.04em;white-space:nowrap}
.bok{background:rgba(0,229,152,.1);color:var(--green);border:1px solid rgba(0,229,152,.18)}
.bwarn{background:rgba(255,179,64,.1);color:var(--gold);border:1px solid rgba(255,179,64,.18)}
.berr{background:rgba(255,79,106,.1);color:var(--red);border:1px solid rgba(255,79,106,.18)}
.binfo{background:rgba(79,124,255,.1);color:var(--accent);border:1px solid rgba(79,124,255,.18)}
.bdef{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}

.fc-route{padding:20px 16px;display:flex;align-items:center}
.ap{flex:1}.ap.r{text-align:right}
.ap-code{font-size:32px;font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ap.r .ap-code{background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ap-city{font-size:11px;color:var(--text2);margin-top:3px;font-weight:500}
.ap-ap{font-size:10px;color:var(--text3)}
.ap-time{font-size:20px;font-weight:700;margin-top:12px;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.ap-tz{font-size:10px;font-weight:400;color:var(--text3)}
.tlink{font-size:11px;font-weight:600;color:var(--accent);text-decoration:none;display:block;margin-top:10px}
.mid{flex:0 0 auto;padding:0 14px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px}
.mdur{font-size:10px;color:var(--text3);font-weight:500}
.rbar{width:72px;height:1px;position:relative;background:linear-gradient(90deg,transparent,rgba(79,124,255,.4),rgba(0,212,255,.4),transparent)}
.fly{position:absolute;top:-9px;font-size:13px;animation:fa 3.5s linear infinite}
@keyframes fa{from{left:-5px;opacity:0}8%{opacity:1}92%{opacity:1}to{left:68px;opacity:0}}
.mstop{font-size:10px;color:var(--text3)}

.fc-dets{border-top:1px solid var(--border);padding:12px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.dv{font-size:12px;font-weight:600;color:var(--text)}
.dv.ok{color:var(--green)}.dv.warn{color:var(--gold)}

.fc-links{border-top:1px solid var(--border);padding:11px 16px;display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fc-links::-webkit-scrollbar{display:none}
.lb{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0;cursor:pointer;-webkit-appearance:none;border:1px solid var(--border);color:var(--text2);background:rgba(255,255,255,.04);transition:transform .12s,opacity .12s}
.lb:active{transform:scale(.94);opacity:.7}
.lb.p{background:linear-gradient(135deg,var(--accent),var(--purple));border-color:transparent;color:white;box-shadow:0 2px 14px rgba(79,124,255,.35)}

.conseil{background:linear-gradient(135deg,rgba(0,229,152,.06),rgba(0,212,255,.04));border:1px solid rgba(0,229,152,.13);border-radius:16px;padding:14px 16px;margin-bottom:14px;font-size:12px;color:rgba(0,229,152,.8);line-height:1.7;animation:fu .4s ease both}
.conseil b{color:var(--green)}

.bottom{height:max(var(--sab),16px);flex-shrink:0}
.install{background:rgba(79,124,255,.12);border-bottom:1px solid rgba(79,124,255,.18);padding:10px 16px;font-size:11px;color:var(--text2);line-height:1.5;display:none;flex-shrink:0}
.install.on{display:block}
.install b{color:var(--text)}
.install .x{float:right;cursor:pointer;font-size:16px;opacity:.45;margin-top:-1px}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="stars" id="starsEl"></div>
<div class="app">
  <div class="sf"></div>
  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">✈</div>
      <div><div class="hdr-title">SkySearch</div><div class="hdr-sub">RECHERCHE DE VOLS</div></div>
    </div>
    <div class="live"><span class="ld"></span>En direct</div>
  </div>
  <div class="install" id="inst">
    <span class="x" onclick="this.parentElement.classList.remove('on');localStorage.setItem('ssb','1')">✕</span>
    Installez : <b>Partager ↑</b> puis <b>Sur l'écran d'accueil</b>
  </div>
  <div class="scroll" id="scr">
    <div class="sw">
      <div class="sc">
        <div class="slabel">Décrivez le vol que vous cherchez</div>
        <textarea id="q" placeholder='« AF6 », « Paris New York ce soir », « Mon mari rentre de Tokyo demain »…' autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        <button class="sbtn" id="btn" onclick="go()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Rechercher
        </button>
      </div>
    </div>
    <div class="chips" id="chips">
      <span class="chip" onclick="fill('AF6')">✈ AF6</span>
      <span class="chip" onclick="fill('BA177')">BA177</span>
      <span class="chip" onclick="fill('EK73')">EK73</span>
      <span class="chip" onclick="fill('QR42')">QR42</span>
      <span class="chip" onclick="fill('LH400')">LH400</span>
      <span class="chip" onclick="fill('TK1')">TK1</span>
      <span class="chip" onclick="fill('Paris New York')">Paris→NY</span>
      <span class="chip" onclick="fill('Paris Tokyo')">Paris→Tokyo</span>
      <span class="chip" onclick="fill('Dubai Londres')">Dubai→LHR</span>
      <span class="chip" onclick="fill('Mumbai Rio')">Mumbai→Rio</span>
    </div>
    <div class="loader" id="ldr">
      <div class="radar"><div class="rr rr1"></div><div class="rr rr2"></div><div class="rplane">✈</div></div>
      <div class="lstep" id="lst">Analyse…</div>
    </div>
    <div class="results" id="out"></div>
  </div>
  <div class="bottom"></div>
</div>
<script>
// Stars
(function(){const s=document.getElementById('starsEl');for(let i=0;i<70;i++){const el=document.createElement('div'),sz=Math.random()<.8?1:2;el.className='star';el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:0;animation:blink ${2+Math.random()*4}s ease-in-out ${-Math.random()*6}s infinite`;s.appendChild(el)}})();

// Install banner
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!localStorage.getItem('ssb'))
  document.getElementById('inst').classList.add('on');

function fill(t){document.getElementById('q').value=t}

// URL builders
const ICAO={AF:'AFR',BA:'BAW',U2:'EZY',LH:'DLH',KL:'KLM',TO:'TVF',FR:'RYR',TP:'TAP',VY:'VLG',IB:'IBE',EK:'UAE',QR:'QTR',AA:'AAL',DL:'DAL',UA:'UAL',AC:'ACA',TK:'THY',LX:'SWR',SK:'SAS',SQ:'SIA',CX:'CPA',NH:'ANA',JL:'JAL',VS:'VIR',KE:'KAL',OZ:'AAR',BR:'EVA',MH:'MAS',TG:'THA',ET:'ETH',MS:'MSR',RJ:'RJA',AI:'AIC',WY:'OMA',GF:'GFA'};
function faU(n){if(!n||n==='—')return'https://flightaware.com/live/findflight/';const c=n.replace(/\s/g,''),code=c.match(/^([A-Z]{1,3})/)?.[1]||'',num=c.replace(/^[A-Z]{1,3}0*/,'');return`https://flightaware.com/live/flight/${ICAO[code]||code}${num}`}
function fr24(n){if(!n||n==='—')return'https://www.flightradar24.com';return`https://www.flightradar24.com/data/flights/${n.replace(/\s/g,'').toLowerCase().replace(/^([a-z]{1,3})0+(\d)/,'$1$2')}`}
function goo(n,d,a){return`https://www.google.com/search?q=${encodeURIComponent([n,d,a].filter(x=>x&&x!=='—').join(' ')+' vol statut')}`}
function normN(r){return r.replace(/^([A-Z]{1,3})0+(\d)/,'$1$2')}
function bc(s){if(!s)return'bdef';const l=s.toLowerCase();if(l.includes('habituel')||l.includes('heure'))return'bok';if(l.includes('retard'))return'bwarn';if(l.includes('annul'))return'berr';if(l.includes('atterri'))return'binfo';return'bdef'}

// ── FLIGHT DATABASE (200+ vols)
const DB={
AF6:{d:'CDG',a:'JFK',hd:'13h30',ha:'15h55',tz:'CET/EST',dur:'9h25',ap:'B777-300ER',td:'2E',ta:'1'},
AF8:{d:'CDG',a:'JFK',hd:'10h35',ha:'13h05',tz:'CET/EST',dur:'9h30',ap:'A350-900',td:'2E',ta:'1'},
AF22:{d:'CDG',a:'LAX',hd:'11h15',ha:'14h10',tz:'CET/PST',dur:'11h55',ap:'B777-200ER',td:'2E',ta:'B'},
AF10:{d:'CDG',a:'LAX',hd:'13h35',ha:'16h10',tz:'CET/PST',dur:'11h35',ap:'B777-300ER',td:'2E',ta:'B'},
AF12:{d:'CDG',a:'MIA',hd:'10h40',ha:'14h30',tz:'CET/EST',dur:'10h50',ap:'B777-200ER',td:'2E',ta:'E'},
AF110:{d:'CDG',a:'EWR',hd:'09h10',ha:'11h45',tz:'CET/EST',dur:'9h35',ap:'A350-900',td:'2E',ta:'B'},
AF66:{d:'CDG',a:'NRT',hd:'12h55',ha:'08h10',tz:'CET/JST',dur:'13h15',ap:'B777-300ER',td:'2E',ta:'1',n:'+1j'},
AF264:{d:'CDG',a:'HND',hd:'13h25',ha:'09h00',tz:'CET/JST',dur:'13h35',ap:'A350-900',td:'2E',ta:'3',n:'+1j'},
AF272:{d:'CDG',a:'HND',hd:'23h55',ha:'18h30',tz:'CET/JST',dur:'13h35',ap:'A350-900',td:'2E',ta:'3',n:'+1j'},
AF160:{d:'CDG',a:'YUL',hd:'10h30',ha:'12h05',tz:'CET/EST',dur:'8h35',ap:'A330-200',td:'2E',ta:'1'},
AF340:{d:'CDG',a:'YVR',hd:'11h05',ha:'12h45',tz:'CET/PST',dur:'10h40',ap:'B787-9',td:'2E',ta:'M'},
AF678:{d:'CDG',a:'DXB',hd:'09h55',ha:'19h00',tz:'CET/GST',dur:'6h05',ap:'B777-300ER',td:'2E',ta:'1'},
AF562:{d:'CDG',a:'DXB',hd:'21h30',ha:'06h45',tz:'CET/GST',dur:'6h15',ap:'A380',td:'2E',ta:'3',n:'+1j'},
AF448:{d:'CDG',a:'IAD',hd:'10h00',ha:'12h45',tz:'CET/EST',dur:'9h45',ap:'B777-200ER',td:'2E',ta:'A'},
AF198:{d:'CDG',a:'GRU',hd:'23h25',ha:'07h05',tz:'CET/BRT',dur:'11h40',ap:'B777-300ER',td:'2E',ta:'3',n:'+1j'},
AF442:{d:'CDG',a:'BOG',hd:'13h25',ha:'18h45',tz:'CET/COT',dur:'11h20',ap:'B787-9',td:'2E',ta:'N'},
AF450:{d:'CDG',a:'MEX',hd:'13h30',ha:'17h20',tz:'CET/CST',dur:'12h50',ap:'B777-200ER',td:'2E',ta:'B'},
AF228:{d:'CDG',a:'NBO',hd:'22h55',ha:'07h30',tz:'CET/EAT',dur:'9h35',ap:'A350-900',td:'2E',ta:'1',n:'+1j'},
AF834:{d:'CDG',a:'JNB',hd:'22h40',ha:'10h10',tz:'CET/SAST',dur:'11h30',ap:'B777-300ER',td:'2E',ta:'A',n:'+1j'},

// Airlines
const AIRS={'air france':{c:'AF'},'airfrance':{c:'AF'},'easyjet':{c:'U2'},'easy jet':{c:'U2'},'british airways':{c:'BA'},'britishairways':{c:'BA'},'lufthansa':{c:'LH'},'ryanair':{c:'FR'},'transavia':{c:'TO'},'klm':{c:'KL'},'tap air portugal':{c:'TP'},'tap portugal':{c:'TP'},'vueling':{c:'VY'},'iberia':{c:'IB'},'emirates':{c:'EK'},'qatar airways':{c:'QR'},'turkish airlines':{c:'TK'},'turkish':{c:'TK'},'swiss':{c:'LX'},'american airlines':{c:'AA'},'delta':{c:'DL'},'united':{c:'UA'},'air canada':{c:'AC'},'singapore airlines':{c:'SQ'},'singapore':{c:'SQ'},'cathay pacific':{c:'CX'},'cathay':{c:'CX'},'ana':{c:'NH'},'jal':{c:'JL'},'korean air':{c:'KE'},'asiana':{c:'OZ'},'eva air':{c:'BR'},'malaysia airlines':{c:'MH'},'thai airways':{c:'TG'},'ethiopian':{c:'ET'},'oman air':{c:'WY'},'gulf air':{c:'GF'},'air india':{c:'AI'}};
const KNOWN=['AF','BA','U2','LH','KL','TO','FR','TP','VY','IB','LX','TK','EK','QR','AA','DL','UA','AC','SQ','CX','NH','JL','VS','KE','OZ','BR','MH','TG','ET','MS','RJ','AI','WY','GF'];

// Analyze query
function analyze(q){
  const raw=q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const fm=q.match(/(?:^|[\s\-(])([A-Z]{1,3})\s?(\d{1,5})(?=$|[\s\-.,)])/i);
  if(fm){const code=fm[1].toUpperCase(),num=fm[2];if(KNOWN.includes(code.substring(0,2))||code.length===2)return{type:'specific',fn:code+num,q}}
  const found=[];
  for(const m of [...q.matchAll(/\b([A-Z]{3})\b/g)]){const k=m[1].toLowerCase();if(C[k]&&!found.some(f=>f.i===C[k].i)){found.push(C[k]);if(found.length===2)break}}
  for(const k of Object.keys(C).sort((a,b)=>b.length-a.length)){
    if(k.length<=3)continue;
    const re=new RegExp('(?<![a-z])'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![a-z])');
    if(re.test(raw)){const c=C[k];if(!found.some(f=>f.i===c.i)){found.push(c);if(found.length===2)break}}
  }
  let airline=null;
  for(const k of Object.keys(AIRS).sort((a,b)=>b.length-a.length)){
    const m=k.length>=4?raw.includes(k):new RegExp('(?<![a-z])'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![a-z])').test(raw);
    if(m){airline=AIRS[k];break}
  }
  let t="aujourd'hui";if(raw.includes('demain'))t='demain';if(raw.includes('matin'))t+=' matin';else if(raw.includes('soir'))t+=' soir';
  return{type:'search',airline,dep:found[0]||null,arr:found[1]||null,time:t,q};
}

function buildResults(a){
  const date=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  if(a.type==='specific'){
    const raw=a.fn,norm=normN(raw),code=raw.match(/^([A-Z]{1,3})/)?.[1]||'',db=DB[norm];
    if(db){
      const dc=C[db.d.toLowerCase()]||{n:db.d,a:'',tz:''},ac=C[db.a.toLowerCase()]||{n:db.a,a:'',tz:''};
      return[{num:raw,co:an(code),di:db.d,dn:dc.n,da:dc.a,ai:db.a,an2:ac.n,aa:ac.a,hd:db.hd,ha:db.ha,tz:db.tz,dur:db.dur,esc:'Direct',note:db.n,st:'Horaire habituel',dets:[{l:'Date',v:date},{l:'Terminal dép.',v:db.td||'—'},{l:'Terminal arr.',v:db.ta||'—'},{l:'Appareil',v:db.ap||'—'},{l:'Durée',v:db.dur||'—'}]}];
    }
    return[{num:raw,co:an(code),di:'—',dn:'',da:'',ai:'—',an2:'',aa:'',hd:null,ha:null,tz:'',dur:null,esc:null,note:null,st:'Voir FlightAware',_fa:faU(raw),dets:[{l:'Date',v:date},{l:'Info',v:'Cliquez FlightAware',ok:true}]}];
  }
  const{airline,dep,arr,time}=a;
  const matches=Object.keys(DB).filter(n=>{const f=DB[n];return(!dep||f.d===dep.i)&&(!arr||f.a===arr.i)&&(!airline||n.startsWith(airline.c))}).sort((x,y)=>parseInt(DB[x].hd)-parseInt(DB[y].hd)).slice(0,3);
  if(matches.length){
    return matches.map(n=>{const db=DB[n],code=n.match(/^([A-Z]{1,3})/)?.[1]||'',dc=C[db.d.toLowerCase()]||{n:db.d,a:'',tz:''},ac=C[db.a.toLowerCase()]||{n:db.a,a:'',tz:''};
      return{num:n,co:an(code),di:db.d,dn:dc.n,da:dc.a,ai:db.a,an2:ac.n,aa:ac.a,hd:db.hd,ha:db.ha,tz:db.tz,dur:db.dur,esc:'Direct',note:db.n,st:'Horaire habituel',dets:[{l:'Date',v:date},{l:'Terminal dép.',v:db.td||'—'},{l:'Terminal arr.',v:db.ta||'—'},{l:'Appareil',v:db.ap||'—'},{l:'Durée',v:db.dur||'—'}]};
    });
  }
  const rfa=(dep&&arr)?`https://www.flightaware.com/live/findflight/?origin=${dep.i}&destination=${arr.i}`:'https://flightaware.com/live/findflight/';
  return[{num:'—',co:airline?an(airline.c):(dep&&arr?`${dep.i}→${arr.i}`:'Route'),di:dep?.i||'—',dn:dep?.n||'',da:dep?.a||'',ai:arr?.i||'—',an2:arr?.n||'',aa:arr?.a||'',hd:null,ha:null,tz:'',dur:null,esc:null,note:null,st:'Voir FlightAware',_fa:rfa,dets:[{l:'Date',v:`${time} · ${date}`},...(airline?[{l:'Compagnie',v:an(airline.c)}]:[]),{l:'Base locale',v:'Route non référencée',warn:true}]}];
}

function renderCard(f,idx){
  const bclass=bc(f.st),rfa=f._fa||faU(f.num),noData=f.hd===null;
  const numH=(!f.num||f.num==='—')?`<a href="${rfa}" target="_blank" style="font-size:12px;color:var(--accent);font-weight:600;text-decoration:none">Voir FlightAware →</a>`:f.num;
  const[tzd,tza]=(f.tz||'/').split('/');
  const hDH=noData?`<a class="tlink" href="${rfa}" target="_blank">Voir horaires →</a>`:`${f.hd} <span class="ap-tz">${tzd||''}</span>`;
  const hAH=noData?`<a class="tlink" href="${rfa}" target="_blank">Voir horaires →</a>`:`${f.ha} <span class="ap-tz">${tza||''}</span>`;
  const dets=f.dets?.length?`<div class="fc-dets">${f.dets.map(d=>`<div><div class="dl">${d.l}</div><div class="dv${d.ok?' ok':d.warn?' warn':''}">${d.v}</div></div>`).join('')}</div>`:'';
  return`<div class="fc" style="animation-delay:${idx*90}ms">
    <div class="fc-head"><div class="fc-left"><span class="fc-num">${numH}</span><span class="fc-co">${f.co||''}</span></div><span class="badge ${bclass}">${f.st}</span></div>
    <div class="fc-route">
      <div class="ap"><div class="ap-code">${f.di}</div><div class="ap-city">${f.dn}</div><div class="ap-ap">${f.da}</div><div class="ap-time">${hDH}</div></div>
      <div class="mid"><div class="mdur">${f.dur||'—'}</div><div class="rbar"><span class="fly">✈</span></div><div class="mstop">${f.esc||'—'}</div></div>
      <div class="ap r"><div class="ap-code">${f.ai}</div><div class="ap-city">${f.an2}</div><div class="ap-ap">${f.aa}</div><div class="ap-time">${hAH}${f.note?`<div style="font-size:10px;color:var(--gold);margin-top:3px">${f.note}</div>`:''}</div></div>
    </div>
    ${dets}
    <div class="fc-links"><a class="lb p" href="${rfa}" target="_blank">FlightAware</a><a class="lb" href="${fr24(f.num)}" target="_blank">FR24</a><a class="lb" href="${goo(f.num!=='—'?f.num:'',f.di!=='—'?f.di:'',f.ai!=='—'?f.ai:'')}" target="_blank">Google</a></div>
  </div>`;
}

const STEPS=['Analyse de votre demande…','Identification du vol…','Recherche dans la base…','Génération de la fiche…'];

async function go(){
  const q=(document.getElementById('q').value||'').trim();
  if(!q)return;
  const btn=document.getElementById('btn'),out=document.getElementById('out'),ldr=document.getElementById('ldr'),lst=document.getElementById('lst');
  btn.disabled=true;out.innerHTML='';ldr.classList.add('on');
  for(let i=0;i<STEPS.length;i++){lst.style.opacity='0';await new Promise(r=>setTimeout(r,100));lst.textContent=STEPS[i];lst.style.opacity='1';await new Promise(r=>setTimeout(r,380))}
  const a=analyze(q),results=buildResults(a);
  ldr.classList.remove('on');
  // Context
  let ctx='';
  if(a.type==='specific'){const inDB=!!DB[normN(a.fn)];ctx=inDB?`Vol <b>${a.fn}</b> trouvé — horaire habituel. Cliquez <b>FlightAware</b> pour le statut du jour.`:`Vol <b>${a.fn}</b> non référencé. Cliquez <b>FlightAware</b> pour les données en direct.`}
  else{const p=[];if(a.airline)p.push(`<b>${an(a.airline.c)}</b>`);if(a.dep)p.push(`depuis <b>${a.dep.n}</b>`);if(a.arr)p.push(`vers <b>${a.arr.n}</b>`);ctx=p.length?`Recherche : ${p.join(', ')}.`:`<b>${a.q}</b>`}
  let html=`<div class="ctx">${ctx}<div class="wtag">⚠ Horaires habituels — vérifiez sur FlightAware</div></div>`;
  if(a.type==='search'&&a.dep&&a.arr){const ru=`https://www.flightaware.com/live/findflight/?origin=${a.dep.i}&destination=${a.arr.i}`;html+=`<a class="rbtn" href="${ru}" target="_blank"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Voir tous les vols ${a.dep.i}→${a.arr.i} sur FlightAware</a>`}
  results.forEach((f,i)=>{html+=renderCard(f,i)});
  html+=`<div class="conseil" style="animation-delay:${(results.length+1)*90}ms"><b>Conseil :</b> Cliquez <b>FlightAware</b> pour le statut en direct, la porte d'embarquement et la position de l'avion sur la carte.</div>`;
  out.innerHTML=html;
  setTimeout(()=>document.getElementById('out').scrollIntoView({behavior:'smooth',block:'start'}),100);
  btn.disabled=false;
}

document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}});
